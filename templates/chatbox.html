<!-- Admin Chatbox Popup -->
<div id="admin-chatbox" class="fixed bottom-20 right-6 z-[2000]" data-current-user-id="{{ session.get('user_id', '') }}" data-current-user-role="{{ session.get('user_role', '') }}">
    <!-- Floating Chat Icon -->
    <button id="chatbox-toggle" class="chatbox-icon rounded-full bg-blue-700 text-white p-4 shadow-lg hover:bg-blue-800 transition" title="Open Chat">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0zm0 0h-.375M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
      </svg>
    </button>
  
    <!-- Chatbox Popup -->
    <div id="chatbox-popup" class="chatbox-popup hidden fixed sm:absolute bottom-4 sm:bottom-20 right-4 sm:right-0 w-80 sm:w-96 lg:w-[28rem] bg-white rounded-lg shadow-2xl flex flex-col overflow-hidden" style="height: min(80vh, 550px); max-height: 80vh; max-width: min(400px, 90vw); top: auto; left: auto;">
      <!-- Header -->
      <div class="flex-shrink-0 bg-blue-700 text-white p-4 rounded-t-lg flex items-center justify-between min-h-16">
        <div class="flex items-center gap-2 min-w-0 flex-1">
          <button id="chatbox-back" class="hidden flex-shrink-0 hover:bg-blue-600 rounded p-2 transition" title="Back to conversations">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
            </svg>
          </button>
          <img
            id="chatbox-product-avatar"
            src=""
            alt="Product"
            class="hidden h-8 w-8 flex-shrink-0 rounded-md border border-blue-200 object-cover"
          />
          <h3 id="chatbox-title" class="font-semibold text-lg truncate">Chat</h3>
        </div>
        <button id="chatbox-close" class="flex-shrink-0 hover:bg-blue-600 rounded p-2 transition" title="Close chat">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
  
      <!-- Tab Navigation -->
      <div id="chatbox-tab-nav" class="flex-shrink-0 chatbox-menu-only border-b border-slate-200 px-4 pt-3 flex gap-0">
        <button class="chatbox-tab-btn mr-2 pb-3 px-3 text-sm font-semibold border-b-2 border-blue-700 text-blue-700 transition" data-tab="admins">
          Admins
        </button>
        <button class="chatbox-tab-btn pb-3 px-3 text-sm font-semibold border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition" data-tab="users">
          Users
        </button>
      </div>
  
      <!-- Search Bar -->
      <div id="chatbox-search-wrap" class="flex-shrink-0 chatbox-menu-only p-4 border-b border-slate-200">
        <input
          type="text"
          id="chatbox-search"
          placeholder="Search users/admins..."
          class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm text-slate-900 placeholder:text-slate-400 outline-none focus:border-blue-600 focus:ring-2 focus:ring-blue-200"
        >
      </div>
  
      <!-- Tab Panels -->
      <div class="flex-1 overflow-y-auto">
        <!-- Admins Tab -->
        <div id="admins-panel" class="chatbox-tab-panel">
          <div class="p-4 space-y-2">
            <p class="chat-list-title text-xs text-slate-500 mb-3">Recent conversations</p>
  
            <div class="flex gap-4">
              <!-- Left: conversation list -->
              <div class="w-1/3 space-y-2" id="admins-list">
                <div class="p-3 text-xs text-slate-400">Loading...</div>
              </div>
  
              <!-- Right: messages container -->
              <div class="w-2/3 bg-white border border-slate-100 rounded-lg flex flex-col hidden" id="admins-messages-container">
                <div class="p-3 flex-1 overflow-y-auto msger-chat" id="admins-messages-list"><!-- messages appended here --></div>
                <div class="flex-shrink-0 p-3 border-t bg-slate-50 msger-inputarea">
                  <div class="flex gap-2 w-full">
                    <input id="admins-message-input" class="flex-1 rounded-lg border px-3 py-2 text-sm msger-input" placeholder="Type a message...">
                    <button class="flex-shrink-0 bg-blue-700 text-white rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap admins-send-btn msger-send-btn">Send</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
  
  
        <!-- Users Tab -->
        <div id="users-panel" class="chatbox-tab-panel hidden">
          <div class="p-4 space-y-2">
            <p class="chat-list-title text-xs text-slate-500 mb-3">Recent conversations</p>
  
            <div class="flex gap-4">
              <!-- Left: conversation list -->
              <div class="w-1/3 space-y-2" id="users-list">
                <div class="p-3 text-xs text-slate-400">Loading...</div>
              </div>
  
              <!-- Right: messages container -->
              <div class="w-2/3 bg-white border border-slate-100 rounded-lg flex flex-col hidden" id="users-messages-container">
                <div class="p-3 flex-1 overflow-y-auto msger-chat" id="users-messages-list"><!-- messages appended here --></div>
                <div class="flex-shrink-0 p-3 border-t bg-slate-50 msger-inputarea">
                  <div class="flex gap-2 w-full">
                    <input id="users-message-input" class="flex-1 rounded-lg border px-3 py-2 text-sm msger-input" placeholder="Type a message...">
                    <button class="flex-shrink-0 bg-blue-700 text-white rounded-lg px-4 py-2 text-sm font-medium whitespace-nowrap users-send-btn msger-send-btn">Send</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
  
      <!-- global message input removed; per-panel inputs shown when a conversation is selected -->
    </div>
  </div>
