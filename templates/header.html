<header class="site-header bg-blue-600 text-white p-4 shadow">
  <div class="header-container">
    <nav class="mt-2">
      <ul class="flex flex-row items-center gap-6">
        <li>
          <a class="logo-link" href="{{ url_for('main.home_page') }}">
            <img
              src="{{ url_for('static', filename='assets/logo/swanflip_logo.png') }}"
              alt="SwanFlip Logo"
              class="logo"
            />
          </a>
        </li>
        <li class="ml-auto">
          <a class="hover:underline" href="#browse">Browse</a>
        </li>
        <li>
          <a class="hover:underline" href="#categories">Categories</a>
        </li>
        {% if session.get('user_id') %}
        <li>
          <a class="hover:underline" href="{{url_for('main.logout')}}"
            >Logout</a
          >
        </li>
        {% else %}
        <li>
          <a class="hover:underline" href="{{ url_for('main.signin_page') }}"
            >Sign In</a
          >
        </li>
        <li>
          <a class="hover:underline" href="{{ url_for('main.signup_page') }}"
            >Sign Up</a
          >
        </li>
        {% endif %}
        <li>
          <a class="hover:underline" href="{{ url_for('main.about_page') }}"
            >About</a
          >
        </li>
      </ul>
    </nav>
  </div>
</header>
