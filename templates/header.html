<header class="site-header bg-blue-600 text-white p-4 shadow">
  <div class="header-container">
    <nav class="mt-2">
      <ul class="nav-list flex flex-row items-center gap-6">
        <li>
          <a class="navlink logo-link" href="{{ url_for('main.home_page') }}">
            <img
              src="{{ url_for('static', filename='assets/logo/swanflip_logo.png') }}"
              alt="SwanFlip Logo"
              class="logo"
            />
          </a>
        </li>
        <li class="ml-auto">
          <a class="hover:underline nav-link" href="{{ url_for('main.browse_page') }}">Browse</a>
        </li>
        <li>
          <a class="hover:underline nav-link" href="#categories">Categories</a>
        </li>
        <li>
          <a class="hover:underline nav-link" href="{{ url_for('main.about_page') }}">About</a>
        </li>
        {% if session.get('user_id') %}
        <li>
          <details class="profile-menu">
            <summary class="profile-trigger">
              <span class="profile-avatar">{{ session.get('user_initials', 'U') }}</span>
            </summary>
            <div class="profile-dropdown">
              <a class="dropdown-link" href="/personalprofile">Profile</a>
              <a class="dropdown-link" href="{{ url_for('main.logout') }}">Logout</a>
            </div>
          </details>
        </li>
        {% else %}
        <li>
          <a class="hover:underline nav-link" href="{{ url_for('main.signin_page') }}">Sign In</a>
        </li>
        <li>
          <a class="hover:underline nav-link" href="{{ url_for('main.signup_page') }}">Sign Up</a>
        </li>
        {% endif %}
      </ul>
    </nav>
  </div>
</header>
